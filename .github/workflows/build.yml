name: Build

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/*.yml"
      - ".gitignore"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "NOTICE"
      - "README.md"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            arch: x86_64
            runs-on: windows-2022
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/prepare-windows
        name: Prepare Windows
      - uses: ./.github/actions/setup-gradle
        with:
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}
        name: Setup Gradle
      - uses: ./.github/actions/build
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Build

  test-windows:
    name: Test Windows
    needs: build-windows
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            arch: x86_64
            runs-on: windows-2022
          - name: windows
            arch: x86_64
            runs-on: windows-2025
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/setup-gradle
        name: Setup Gradle
      - uses: ./.github/actions/test
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Test

  build-linux:
    name: Build Linux
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            arch: aarch64
            runs-on: ubuntu-22.04
          - name: linux
            arch: x86_64
            runs-on: ubuntu-22.04
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/prepare-linux
        with:
          platform-arch: ${{ matrix.platform.arch }}
        name: Prepare Linux
      - uses: ./.github/actions/setup-gradle
        with:
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}
        name: Setup Gradle
      - uses: ./.github/actions/build
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Build

  test-linux:
    name: Test Linux
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            arch: aarch64
            runs-on: ubuntu-22.04-arm
            java-arch: aarch64
          - name: linux
            arch: aarch64
            runs-on: ubuntu-24.04-arm
            java-arch: aarch64
          - name: linux
            arch: x86_64
            runs-on: ubuntu-22.04
            java-arch: x64
          - name: linux
            arch: x86_64
            runs-on: ubuntu-24.04
            java-arch: x64
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/setup-gradle
        with:
          java-architecture: ${{ matrix.platform.java-arch }}
        name: Setup Gradle
      - uses: ./.github/actions/test
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Test

  build-macos:
    name: Build macOS
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos
            arch: x86_64
            runs-on: macos-14
          - name: macos
            arch: aarch64
            runs-on: macos-14
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/prepare-macos
        name: Prepare macOS
      - uses: ./.github/actions/setup-gradle
        with:
          gradle-cache-read-only: ${{ github.event_name == 'pull_request' }}
        name: Setup Gradle
      - uses: ./.github/actions/build
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Build

  test-macos:
    name: Test macOS
    needs: build-macos
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos
            arch: x86_64
            runs-on: macos-15-intel
          - name: macos
            arch: aarch64
            runs-on: macos-14
          - name: macos
            arch: aarch64
            runs-on: macos-15
          - name: macos
            arch: aarch64
            runs-on: macos-26
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/setup-gradle
        name: Setup Gradle
      - uses: ./.github/actions/test
        with:
          platform-name: ${{ matrix.platform.name }}
          platform-arch: ${{ matrix.platform.arch }}
        name: Test

  detect-release:
    name: Detect Release
    needs:
      - test-windows
      - test-linux
      - test-macos
    if: ${{ success() && github.repository == 'SagaHealthcareIT/webrtc-java-slim' && github.ref_name == 'master' }}
    runs-on: ubuntu-22.04
    outputs:
      unreleased: ${{ steps.version.outputs.unreleased }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: "0"
        name: Checkout Repository
      - name: Get Release Version
        id: version
        run: |
          version=$(cat gradle.properties | grep version= | cut -d'=' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
          unreleased=$(git show-ref --tags --verify --quiet "refs/tags/${version}" && echo false || echo true)
          echo "unreleased=$unreleased" >> $GITHUB_OUTPUT
        shell: bash

  release:
    name: Release and Publish
    needs:
      - detect-release
    if: ${{ success() && github.repository == 'SagaHealthcareIT/webrtc-java-slim' && github.ref_name == 'master' && needs.detect-release.outputs.unreleased == 'true' }}
    runs-on: ubuntu-22.04
    # Manual gate on Maven Central publishes (audit 2026-07-03 M6): the
    # environment must be configured in repo settings with a required
    # reviewer, otherwise this key changes nothing.
    environment: maven-central
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        name: Checkout Repository
      - uses: ./.github/actions/setup-gradle
        name: Setup Gradle
      # Generate the SBOM BEFORE publishing, so a build/SBOM failure aborts the
      # job before anything is pushed to Maven Central (publish is not
      # reversible; a later step failing would leave a half-completed release).
      - name: Generate CycloneDX SBOM
        run: ./gradlew cyclonedxBom
      - uses: ./.github/actions/publish
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        name: Publish to Maven Central
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.detect-release.outputs.version }}"
          # Provenance: the exact WebRTC src commit (and thereby all
          # DEPS-pinned transitive revisions) the natives were built from.
          grep '^webrtc.branch=' webrtc-jni/gradle.properties > webrtc-src-revision.txt
          gh release create "${version}" \
            --title "${version}" \
            --generate-notes \
            webrtc/build/libs/*.jar \
            native-staging/webrtc-java-jni-*/*.jar \
            build/reports/cyclonedx/bom.json \
            webrtc-src-revision.txt
